<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables tag</title>
</head>
<body>
    <p>columnspan</p>
    <table>
        <table border="1">
        <tr>
            <th colspan="2">student details</th>
        </tr>
        <tr>
            <th>name</th>
            <th>age</th>
        </tr>
        <tr>
            <td>prithvi</td>
            <td>19</td>
        </tr>
    </table>

    <p>rowspan</p>
    <table>
        <table border="1">
        <tr>
            <th rowspan="2">day</th>
            <th>name</th>
            <th>age</th>
        </tr>
        <tr>
            <td>prithvi</td>
            <td>19</td>
        </tr>
    </table>
</body>
</html>
